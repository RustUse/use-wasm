name: Cargo Audit

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    audit:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v6
            - name: Install cargo-audit
              uses: taiki-e/install-action@cargo-audit
            - name: Run cargo audit
              run: cargo audit
