name: Cargo Deny

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    deny:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v6
            - name: Install cargo-deny
              uses: taiki-e/install-action@cargo-deny
            - name: Run cargo-deny
              run: cargo deny check
