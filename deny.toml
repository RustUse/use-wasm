[graph]
all-features = true

[advisories]
unmaintained = "none"
yanked = "warn"
ignore = []

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "warn"
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
    "sparse+https://index.crates.io/",
]
