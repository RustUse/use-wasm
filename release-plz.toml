[[package]]
name = "use-wasm-text"
release = true
version_group = "rustuse-wasm"

[[package]]
name = "use-wasm-section"
release = true
version_group = "rustuse-wasm"

[[package]]
name = "use-wasm-import"
release = true
version_group = "rustuse-wasm"

[[package]]
name = "use-wasm-export"
release = true
