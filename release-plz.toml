release = true
version_group = "rustuse-wasm"

[[package]]
name = "use-wasi"
release = true
version_group = "rustuse-wasm"

[[package]]
name = "use-wasm"
release = true
version_group = "rustuse-wasm"
changelog_update = true
changelog_path = "./CHANGELOG.md"
changelog_include = [
    "use-wasm-module",
    "use-wasm-binary",
    "use-wasm-text",
    "use-wasm-section",
    "use-wasm-import",
    "use-wasm-export",
    "use-wasm-memory",
    "use-wasm-value",
    "use-wasm-function",
    "use-wasm-target",
    "use-wasm-feature",
    "use-wasm-component",
    "use-wasm-wit",
    "use-wasi",
]

[changelog]
header = """# Changelog

## Unreleased
"""
protect_breaking_commits = true
sort_commits = "oldest"
commit_parsers = [
    { message = "^feat(?:\\([^)]+\\))?!?: .+", group = "Added" },
    { message = "^fix(?:\\([^)]+\\))?!?: .+", group = "Fixed" },
    { message = "^security(?:\\([^)]+\\))?!?: .+", group = "Security" },
    { message = "^(?:refactor|perf|change)(?:\\([^)]+\\))?!?: .+", group = "Changed" },
    { message = "^docs(?:\\([^)]+\\))?!?: .+", group = "Documentation" },
    { message = "^(?:build|ci|chore|deps|test)(?:\\([^)]+\\))?!?: .+", group = "Tooling" },
    { footer = "^changelog: ?ignore$", skip = true },
    { message = "^.*", group = "Changed" },
]
